apiVersion: ome.io/v1beta1
kind: ClusterServingRuntime
metadata:
  name: tokenspeed-inkling-nvfp4
spec:
  acceleratorRequirements:
    acceleratorClasses:
      - nvidia-b200-4
      - nvidia-b200-8
  disabled: false
  supportedModelFormats:
    - modelFramework:
        # Inkling does not declare a transformers_version in config.json.
        name: transformers
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: InklingForConditionalGeneration
      version: "1.0.0"
      quantization: nvfp4
      priority: 1
      acceleratorConfig:
        nvidia-b200-4:
          tensorParallelismOverride:
            tensorParallelSize: 4
          runtimeArgsOverride:
            - --attn-tp-size=4
            - --moe-tp-size=4
        nvidia-b200-8:
          tensorParallelismOverride:
            tensorParallelSize: 8
          runtimeArgsOverride:
            - --attn-tp-size=8
            - --moe-tp-size=8
  modelSizeRange:
    min: 900B
    max: 1050B
  protocolVersions:
    - openAI
  routerConfig:
    annotations:
      prometheus.io/path: /metrics
      prometheus.io/port: "29000"
      prometheus.io/scrape: "true"
    labels:
      logging-forward: enabled
    runner:
      name: router
      image: ghcr.io/lightseekorg/smg:nightly-20260717-ab43710
      terminationMessagePolicy: FallbackToLogsOnError
      ports:
        - containerPort: 8080
          name: http
          protocol: TCP
      resources:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "8"
          memory: 16Gi
      command:
        - smg
        - launch
      args:
        - --host
        - 0.0.0.0
        - --port
        - "8080"
        - --service-discovery
        - --service-discovery-namespace
        - $(NAMESPACE)
        - --service-discovery-port
        - "8080"
        - --selector
        - component=engine ome.io/inferenceservice=$(INFERENCESERVICE_NAME)
        - --reasoning-parser
        - inkling
        - --tool-call-parser
        - inkling
        - --policy
        - cache_aware
        - --enable-igw
        - --log-json
        - --disable-retries
        - --disable-circuit-breaker
      env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: INFERENCESERVICE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['ome.io/inferenceservice']
      readinessProbe:
        httpGet:
          path: /readiness
          port: 8080
        failureThreshold: 5
        periodSeconds: 30
        timeoutSeconds: 10
      livenessProbe:
        httpGet:
          path: /liveness
          port: 8080
        failureThreshold: 5
        periodSeconds: 30
        timeoutSeconds: 10
      startupProbe:
        httpGet:
          path: /health
          port: 8080
        failureThreshold: 5
        periodSeconds: 20
        timeoutSeconds: 10
        initialDelaySeconds: 30
  engineConfig:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      prometheus.io/path: /metrics
    labels:
      logging-forward: enabled
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    volumes:
      - name: dshm
        emptyDir:
          medium: Memory
    runner:
      name: ome-container
      image: ghcr.io/lightseekorg/smg:ab43710-tokenspeed-tml
      terminationMessagePolicy: FallbackToLogsOnError
      ports:
        - containerPort: 8080
          name: grpc1
          protocol: TCP
      command:
        - python3
        - -m
        - smg_grpc_servicer.tokenspeed
      args:
        - --host=0.0.0.0
        - --port=8080
        - --model=$(MODEL_PATH)
        - --attn-tp-size=4
        - --moe-tp-size=4
        - --max-model-len=81920
        - --max-num-seqs=16
        - --max-prefill-tokens=8192
        - --chunked-prefill-size=8192
        - --gpu-memory-utilization=0.95
        - --disable-cuda-graph-padding
        - --trust-remote-code
        - --attention-backend=fa4
        - --moe-backend=flashinfer_trtllm
        - --enable-prefix-caching
        - --disable-kvstore
        - --block-size=128
        - --enable-cache-report
        - --speculative-algorithm=MTP
        - --speculative-num-steps=3
        - --speculative-eagle-topk=1
        - --speculative-num-draft-tokens=4
        - --served-model-name=vllm-model
      env:
        - name: HF_HUB_OFFLINE
          value: "1"
      volumeMounts:
        - mountPath: /dev/shm
          name: dshm
      resources:
        requests:
          cpu: 32
          memory: 512Gi
          nvidia.com/gpu: 4
        limits:
          cpu: 128
          memory: 512Gi
          nvidia.com/gpu: 4
      readinessProbe:
        grpc:
          port: 8080
          service: tokenspeed.grpc.scheduler.TokenSpeedScheduler
        failureThreshold: 3
        successThreshold: 1
        periodSeconds: 90
        timeoutSeconds: 60
      livenessProbe:
        grpc:
          port: 8080
        failureThreshold: 5
        successThreshold: 1
        periodSeconds: 60
        timeoutSeconds: 60
      startupProbe:
        grpc:
          port: 8080
        failureThreshold: 200
        successThreshold: 1
        periodSeconds: 6
        initialDelaySeconds: 60
        timeoutSeconds: 30
