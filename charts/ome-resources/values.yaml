# Global settings that apply to all resources
global:
  # Image pull secrets for all containers in the chart
  # Example:
  # imagePullSecrets:
  #   - name: my-registry-secret
  hub: "ghcr.io/moirai-internal"
  imagePullSecrets: []

ome:
  version: &defaultVersion v1.2.1
  benchmarkJob:
    image: genai-bench
    tag: 0.1.113
    cpuRequest: "2"
    memoryRequest: "2Gi"
    cpuLimit: "2"
    memoryLimit: "2Gi"
  multinodeProber:
    image: multinode-prober
    tag: *defaultVersion
    memoryRequest: 100Mi
    cpuRequest: 100m
    memoryLimit: 100Mi
    cpuLimit: 100m
    startupFailureThreshold: 150
    startupPeriodSeconds: 30
    startupTimeoutSeconds: 60
    startupInitialDelaySeconds: 120
    unavailableThresholdSeconds: 600
  controller:
    replicaCount: 3
    deploymentMode: "RawDeployment"
    ingressGateway:
      domain: svc.cluster.local
      domainTemplate: "{{ .Name }}.{{ .Namespace }}.{{ .IngressDomain }}"
      urlScheme: http
      disableIstioVirtualHost: false
      ingressGateway:
        gateway: knative-serving/knative-ingress-gateway
        gatewayService: istio-ingressgateway.istio-system.svc.cluster.local
        className: istio
      omeIngressGateway: ""
      additionalIngressDomains: null
      pathTemplate: ""
      disableIngressCreation: true
      enableGatewayAPI: false
    nodeSelector: {}
    tolerations: []
    topologySpreadConstraints: []
    affinity: {}
    image: ome-manager
    tag: *defaultVersion
    resources:
      limits:
        cpu: 2
        memory: 4Gi
      requests:
        cpu: 2
        memory: 4Gi
  omeAgent:
    image: ome-agent
    tag: *defaultVersion
    authType: InstancePrincipal
    compartmentId: ocid1.compartment.oc1..dummy-compartment
    vaultId: ocid1.vault.oc1.ap-osaka-1.dummy.dummy-vault
    region: ap-osaka-1
    modelInit:
      memoryRequest: 150Gi
      memoryLimit: 180Gi
      cpuRequest: 15
      cpuLimit: 15
      extraEnvVars: []
      extraVolumeMounts: []
    fineTunedAdapter:
      memoryRequest: 300Gi
      memoryLimit: 320Gi
      cpuRequest: 15
      cpuLimit: 15
    # metadataJob configures the metadata-extraction Job the BaseModel
    # controller spawns on demand for PVC-backed models. It runs
    # `ome-agent model-metadata` against the PVC-mounted model directory.
    metadataJob:
      serviceAccount: ome-model-metadata
      memoryRequest: 256Mi
      memoryLimit: 512Mi
      cpuRequest: 100m
      cpuLimit: 500m
      backoffLimit: 2
      ttlSecondsAfterFinished: 3600
      # Pass-through scheduling hints applied to the metadata Job pod.
      # Use these when the PVC's CSI driver only mounts on a subset of
      # nodes or when models live on tainted nodes (e.g., GPU nodes).
      nodeSelector: {}
      tolerations: []
      affinity: {}
      priorityClassName: ""
  kedaConfig:
    enableKeda: true
    promServerAddress: "http://prometheus-operated.monitoring.svc.cluster.local:9090"
    customPromQuery: ""
    scalingThreshold: "10"
    scalingOperator: "GreaterThanOrEqual"
modelAgent:
  hostPath: /mnt/data/models
  priorityClassName: system-node-critical
  serviceAccountName: ome-model-agent
  image:
    # Docker registry hub. If set, overrides global.hub for model-agent.
    # If repository contains '/', hub is ignored.
    # Leave empty to use global.hub
    hub: ""
    repository: model-agent
    pullPolicy: Always
    tag: *defaultVersion

  # Instance-type -> short-name mappings, by cloud provider. Single source of
  # truth: rendered into the model-agent ConfigMap (instance-type-map) and the
  # enigma init container's INSTANCE_TYPE_MAP env var via the
  # "ome.instanceTypeMap" helper. To onboard a new GPU shape, add it here only.
  instanceTypeMap:
    # Oracle Cloud (OCI)
    BM.GPU.A10.4: A10
    BM.GPU.A100-v2.8: A100-80G
    BM.GPU4.8: A100-40G
    BM.GPU.B4.8: A100-40G
    BM.GPU.H100.8: H100
    BM.GPU.H100-NC.8: H100
    BM.GPU.H200.8: H200
    BM.GPU.H200-NC.8: H200
    BM.GPU.B200.8: B200
    BM.GPU.B300.8: B300
    # AWS
    p5.48xlarge: H100
    # Azure
    Standard_ND96isr_H100_v5: H100
    # Google Cloud
    a3-highgpu-8g: H100
    # CoreWeave
    gd-8xh100ib-i128: H100
    gd-8xh200ib-i128: H200
    gd-8xl40-i128: L40
    # Nebius
    gpu-h100-sxm: H100
    gpu-h200-sxm: H200
    gpu-b200-sxm: B200
    gpu-l40s: L40S

  # When enabled, the model agent will only run on nodes with GPU
  gpuNodesOnly: false

  # GPU node label selector (used when gpuNodesOnly is true)
  # Examples:
  #   For NVIDIA GPU operator: nvidia.com/gpu.present: "true"
  #   For Nebius: nebius.com/gpu: "true"
  #   For AWS: node.kubernetes.io/instance-type: g4dn.xlarge
  gpuNodeLabel:
    key: nvidia.com/gpu.present
    value: "true"

  nodeSelector: {}

  # Additional volumes to mount into the model-agent DaemonSet pods
  # Examples:
  # extraVolumes:
  #   - name: shared-tmp
  #     emptyDir: {}
  #   - name: config
  #     configMap:
  #       name: my-config
  extraVolumes: []

  # Additional volumeMounts for the model-agent container
  # Examples:
  # extraVolumeMounts:
  #   - name: shared-tmp
  #     mountPath: /tmp/shared
  #   - name: config
  #     mountPath: /etc/model-agent/config
  #     readOnly: true
  extraVolumeMounts: []

  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule

  health:
    port: 8080

  # Additional environment variables for the model-agent container
  # Examples:
  # env:
  #   LOG_LEVEL: "debug"
  #   DOWNLOAD_RETRY: "5"
  env: {}

  resources:
    limits:
      cpu: '10'
      memory: 100Gi
    requests:
      cpu: '10'
      memory: 100Gi
